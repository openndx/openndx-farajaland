
services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.7
    environment:
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd:2380
      - ETCD_INITIAL_CLUSTER=default=http://etcd:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_NAME=default
    networks:
      - exchange-network

  api-gateway:
    depends_on:
      - etcd
    image: apache/apisix:latest
    ports:
      - "9081:9081"
      - "9180:9180"
    networks:
      - exchange-network
    volumes:
      - ./config/apisix/conf.yaml:/usr/local/apisix/conf/config.yaml

  # Stage A: seed the ThunderID image's bundled SQLite DB files into named
  # volumes so thunderid-setup/thunderid see a writable copy.
  thunderid-db-init:
    image: ghcr.io/thunder-id/thunderid:${THUNDERID_IMAGE_TAG:-0.48.0}
    container_name: thunderid-db-init-${ENVIRONMENT:-local}
    # -n (no-clobber): seed only if empty. Recreating this container (e.g. after
    # an unrelated env var change) must never overwrite an already-populated
    # volume - a plain `cp -r` would silently wipe existing ThunderID data.
    command: sh -c "cp -rn /opt/thunderid/database/* /data/ && (cp -rn /opt/thunderid/consent/repository/database/* /consent-data/ 2>/dev/null || true)"
    volumes:
      - thunderid-db:/data
      - consent-db:/consent-data
    restart: "no"
    networks:
      - exchange-network

  # Stage B: one-shot bootstrap. setup.sh runs ThunderID's in-process orchestrator
  # (0.48), which imports every resource-definition file under /opt/thunderid/bootstrap:
  # the image's 01-default-resources.yaml (default OU, Person user type, Administrator
  # role, Console app) plus our mounted 02-admin-cli.yaml (creates the ADMIN_CLI M2M
  # client + system role used by init.sh to mint management tokens).
  thunderid-setup:
    image: ghcr.io/thunder-id/thunderid:${THUNDERID_IMAGE_TAG:-0.48.0}
    container_name: thunderid-setup-${ENVIRONMENT:-local}
    command: ./setup.sh
    depends_on:
      thunderid-db-init:
        condition: service_completed_successfully
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-1234}
      - ADMIN_CLI_SECRET=${ADMIN_CLI_SECRET:-1234}
      - DIRECT_AUTH_SECRET=${DIRECT_AUTH_SECRET:-1234}
      - PUBLIC_URL=${IDP_BASE_URL:-https://localhost:8090}
      - PORT=${IDP_PORT:-8090}
      - HOSTNAME=0.0.0.0
      - SMTP_HOST=${SMTP_HOST:-localhost}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USERNAME=${SMTP_USERNAME:-dummy}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-dummy}
      - SMTP_FROM_ADDRESS=${SMTP_FROM_ADDRESS:-noreply@farajaland.local}
      - SMTP_ENABLE_START_TLS=${SMTP_ENABLE_START_TLS:-false}
      - SMTP_ENABLE_AUTHENTICATION=${SMTP_ENABLE_AUTHENTICATION:-false}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - IDP_BROWSER_URL=${IDP_BROWSER_URL:-https://thunderid:8090}
    volumes:
      - thunderid-db:/opt/thunderid/database
      - consent-db:/opt/thunderid/consent/repository/database
      - ./config/thunderid/bootstrap/02-custom-resources.yaml:/opt/thunderid/bootstrap/02-custom-resources.yaml
    restart: "no"
    networks:
      - exchange-network

  thunderid:
    image: ghcr.io/thunder-id/thunderid:${THUNDERID_IMAGE_TAG:-0.48.0}
    container_name: thunderid-${ENVIRONMENT:-local}
    depends_on:
      thunderid-setup:
        condition: service_completed_successfully
    ports:
      - "${IDP_PORT:-8090}:${IDP_PORT:-8090}"
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-1234}
      - ADMIN_CLI_SECRET=${ADMIN_CLI_SECRET:-1234}
      - DIRECT_AUTH_SECRET=${DIRECT_AUTH_SECRET:-1234}
      - PUBLIC_URL=${IDP_BASE_URL:-https://localhost:8090}
      - PORT=${IDP_PORT:-8090}
      - HOSTNAME=0.0.0.0
      # CORS is no longer configured via deployment.yaml/env in 0.48. The Consent
      # Portal origin is set at provisioning time by init.sh via PUT
      # /server-config/cors (the server's dynamic CORS server-config section). The
      # Console is served from the issuer, so its token calls are same-origin.
      - SMTP_HOST=${SMTP_HOST:-localhost}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USERNAME=${SMTP_USERNAME:-dummy}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-dummy}
      - SMTP_FROM_ADDRESS=${SMTP_FROM_ADDRESS:-noreply@farajaland.local}
      - SMTP_ENABLE_START_TLS=${SMTP_ENABLE_START_TLS:-false}
      - SMTP_ENABLE_AUTHENTICATION=${SMTP_ENABLE_AUTHENTICATION:-false}
      - IDP_BROWSER_URL=${IDP_BROWSER_URL:-https://thunderid:8090}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    volumes:
      - thunderid-db:/opt/thunderid/database
      - consent-db:/opt/thunderid/consent/repository/database
      - ./config/thunderid/deployment.yaml:/opt/thunderid/deployment.yaml
    healthcheck:
      test: ["CMD-SHELL", "curl -k -s -o /dev/null https://localhost:${IDP_PORT:-8090}/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
    restart: unless-stopped
    networks:
      - exchange-network

  policy-decision-point:
    depends_on:
      - postgres
    image: ghcr.io/opendif/opendif-core/policy-decision-point:0.1.0
    platform: linux/amd64
    container_name: pdp-${ENVIRONMENT:-local}
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-local}
      - PORT=8082
      - HOST=${HOST:-0.0.0.0}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-text}
      - JWT_SECRET=${JWT_SECRET:-local-secret-key}
      - CORS=${CORS:-true}
      - RATE_LIMIT=${RATE_LIMIT:-1000}
      # Database configuration
      - CHOREO_OPENDIF_DATABASE_HOSTNAME=${PDP_DB_HOST:-localhost}
      - CHOREO_OPENDIF_DATABASE_PORT=${PDP_DB_PORT:-5432}
      - CHOREO_OPENDIF_DATABASE_USERNAME=${PDP_DB_USERNAME:-postgres}
      - CHOREO_OPENDIF_DATABASE_PASSWORD=${PDP_DB_PASSWORD:-password}
      - CHOREO_OPENDIF_DATABASE_DATABASENAME=${PDP_DB_NAME:-testdb}
      - DB_SSLMODE=${DB_SSLMODE:-require}
      - RUN_MIGRATION=${RUN_MIGRATION:-false}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - exchange-network

  consent-engine:
    depends_on:
      - postgres
      - thunderid
    # Image with the generic (IdP-agnostic) JWT verifier — validates issuer +
    # audience + client_id, no organization claim (OpenDIF/opendif-core#450),
    # and supports IDP_JWKS_INSECURE_SKIP_VERIFY (#452).
    image: ghcr.io/opendif/opendif-core/consent-engine:${CE_IMAGE_TAG:-sha-79a8b79fd9e5c30f676a2ae950eeaec3d19eabd9}
    platform: linux/amd64
    container_name: ce-${ENVIRONMENT:-local}
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-local}
      - PORT=8081
      - HOST=${HOST:-0.0.0.0}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-text}
      - JWT_SECRET=${JWT_SECRET:-local-secret-key}
      - CORS=${CORS:-true}
      - RATE_LIMIT=${RATE_LIMIT:-1000}
      # Database configuration (local image reads DB_* names)
      - DB_HOST=${CE_DB_HOST:-localhost}
      - DB_PORT=${CE_DB_PORT:-5432}
      - DB_USERNAME=${CE_DB_USERNAME:-postgres}
      - DB_PASSWORD=${CE_DB_PASSWORD:-1234}
      - DB_NAME=${CE_DB_NAME:-consent_engine}
      - DB_SSLMODE=${DB_SSLMODE:-require}
      - DB_MAX_OPEN_CONNS=${DB_MAX_OPEN_CONNS:-25}
      - DB_MAX_IDLE_CONNS=${DB_MAX_IDLE_CONNS:-5}
      - DB_CONN_MAX_LIFETIME=${DB_CONN_MAX_LIFETIME:-1h}
      - DB_CONN_MAX_IDLE_TIME=${DB_CONN_MAX_IDLE_TIME:-30m}
      - DB_QUERY_TIMEOUT=${DB_QUERY_TIMEOUT:-30s}
      - DB_CONNECT_TIMEOUT=${DB_CONNECT_TIMEOUT:-10s}
      - DB_RETRY_ATTEMPTS=${DB_RETRY_ATTEMPTS:-3}
      - DB_RETRY_DELAY=${DB_RETRY_DELAY:-1s}
      - CONSENT_PORTAL_URL=${CONSENT_PORTAL_URL:-http://localhost:5173}
      # Generic IdP config (verifier validates issuer + audience + client_id, no org).
      - IDP_ISSUER=${IDP_ISSUER:-https://localhost:8090}
      - IDP_AUDIENCE=${IDP_AUDIENCE:-CONSENT_PORTAL_APP}
      - IDP_CLIENT_ID=${CONSENT_PORTAL_CLIENT_ID:-CONSENT_PORTAL_APP}
      - IDP_JWKS_URL=${IDP_JWKS_URL:-https://thunderid:8090/oauth2/jwks}
      # ThunderID serves a self-signed dev cert; skip TLS verification on the
      # JWKS fetch (matches apisix ssl_verify:false / DIE rejectUnauthorized:false).
      - IDP_JWKS_INSECURE_SKIP_VERIFY=${IDP_JWKS_INSECURE_SKIP_VERIFY:-true}
      - CORS_ALLOWED_ORIGINS=${CONSENT_PORTAL_URL:-http://localhost:5173}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - exchange-network

  consent-portal:
    depends_on:
      - postgres
      - thunderid
    image: ghcr.io/opendif/opendif-core/consent-portal:0.1.0
    ports:
      - "${PORT_CP:-5173}:80"
    platform: linux/amd64
    environment:
      - VITE_API_URL=http://localhost:9081/api/v1
      - VITE_CLIENT_ID=${CONSENT_PORTAL_CLIENT_ID:-consent-portal}
      # VITE_BASE_URL is the IdP the browser is redirected to for login, so it must
      # be reachable from the browser. For this local stack IDP_BASE_URL is
      # https://localhost:8090 (see ndx/.env) - the browser reaches it directly and
      # ThunderID's dev cert is CN=localhost, so no /etc/hosts entry is required.
      - VITE_BASE_URL=${IDP_BASE_URL:-https://localhost:8090}
      - VITE_SCOPE=openid profile email
      - VITE_SIGN_IN_REDIRECT_URL=http://localhost:5173
      - VITE_SIGN_OUT_REDIRECT_URL=http://localhost:5173


  orchestration-engine:
    image: ghcr.io/opendif/opendif-core/orchestration-engine:0.1.0
    platform: linux/amd64
    container_name: oe-${ENVIRONMENT:-local}
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-local}
      - PORT=4000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-text}
      - CONFIG_PATH=${CONFIG_PATH:-./config.json}
    volumes:
      - ${OE_CONFIG_PATH}:/app/config.json:ro
      - ${OE_SCHEMA_PATH}:/app/schema.graphql:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - exchange-network

  audit-service:
    image: ghcr.io/opendif/opendif-core/audit-service:0.1.0
    platform: linux/amd64
    container_name: audit-${ENVIRONMENT:-local}
    depends_on:
      - postgres
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-local}
      - PORT=3001
      - DB_TYPE=${AUDIT_DB_TYPE:-postgres}
      - DB_HOST=${AUDIT_DB_HOST:-localhost}
      - DB_PORT=${AUDIT_DB_PORT:-5432}
      - DB_USERNAME=${AUDIT_DB_USERNAME:-exchange}
      - DB_PASSWORD=${AUDIT_DB_PASSWORD:-exchange}
      - DB_NAME=audit_db
    volumes:
      - ./config/audit/enums.yml:/app/config/enums.yaml:ro
    networks:
      - exchange-network
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: pg-${ENVIRONMENT:-local}
    environment:
      POSTGRES_USER: ${DB_USER:-exchange}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-exchange}
      POSTGRES_DB: ${DB_NAME:-exchange_service}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./opendif_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./consent_engine_schema.sql:/docker-entrypoint-initdb.d/02_consent_engine_schema.sql
      - ./audit_service_schema.sql:/docker-entrypoint-initdb.d/03_audit_service_schema.sql
    networks:
      - exchange-network
    restart: unless-stopped

networks:
  exchange-network:
    driver: bridge

volumes:
  pg_data:
  thunderid-db:
  consent-db: